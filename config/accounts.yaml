# =============================================================================
# Arabesque — Configuration des comptes de trading
# =============================================================================
#
# RÈGLE DE SÉCURITÉ :
#   protected: true  → le moteur live REFUSE de trader dessus
#                       sans l'argument --force-live en ligne de commande.
#                       Utilisez protected: true pour TOUS les vrais comptes
#                       tant qu'ils ne sont pas en phase de production validée.
#
#   protected: false → compte utilisable en live test (dry-run, démo, test).
#
# Les credentials (tokens, passwords) restent dans config/secrets.yaml.
# Ce fichier ne contient que des métadonnées et des flags de sécurité.
# =============================================================================

accounts:

  # --------------------------------------------------------------------------
  # FTMO — Compte de test (cTrader)
  # --------------------------------------------------------------------------
  ftmo_swing_test:
    type: ctrader
    protected: false                # ← test OK, pas de fonds réels
    label: "FTMO Swing Test — compte de test, OK pour dry-run et live test"
    is_demo: false                  # cTrader "live" mais compte test FTMO
    broker_key: ftmo_swing_test     # clé dans config/settings.yaml → brokers
    risk_per_trade_pct: 0.45        # funded mode (override general.risk_percent)
    max_daily_dd_pct: 3.0           # FTMO = 5%, garde interne 3%
    max_total_dd_pct: 8.0           # FTMO = 10%, garde interne 8%

  # --------------------------------------------------------------------------
  # FTMO — Challenge Phase 1 (cTrader, 2-step)
  # --------------------------------------------------------------------------
  # 100k USD | Objectif P1: +10% | P2: +5% | MaxDD 10% balance | Daily DD 5% balance
  # Levier 1:30 (swing) | Overnight/weekend/news OK | Split 80%
  ftmo_challenge:
    type: ctrader
    protected: false              # ← OK pour live (risk conservatif 0.45%)
    label: "FTMO Challenge Phase 1 — 100k 2-step swing"
    is_demo: false
    broker_key: ftmo_challenge
    prop_firm: ftmo
    challenge_phase: 1            # Phase 1 = objectif 10%
    initial_balance: 100000
    profit_target_pct: 10.0       # Phase 1 target
    risk_per_trade_pct: 0.45      # conservatif (compte en DD -0.44%, validation d'abord)
    # → Passer à 0.80% une fois la config validée en live
    max_daily_dd_pct: 3.0         # FTMO = 5%, garde interne 3%
    max_total_dd_pct: 8.0         # FTMO = 10%, garde interne 8%
    leverage: 30                  # 1:30 swing
    overnight_allowed: true
    news_trading_allowed: true

  # ftmo_funded:
  #   type: ctrader
  #   protected: true
  #   label: "FTMO Funded 100k"
  #   is_demo: false
  #   broker_key: ftmo_funded
  #   risk_per_trade_pct: 0.45
  #   max_daily_dd_pct: 3.0
  #   max_total_dd_pct: 8.0

  # --------------------------------------------------------------------------
  # GFT — Challenge Phase 1 (TradeLocker, 2-step GOAT)
  # --------------------------------------------------------------------------
  # 150k USD | Objectif P1: +8% | P2: +6% | MaxDD 10% | Daily DD 4%
  # Levier 1:100 | Instruments limités (pas de crypto altcoins)
  gft_compte1:
    type: tradelocker
    protected: true               # ← challenge réel
    label: "GFT Challenge Phase 1 — 150k 2-step GOAT"
    is_demo: false
    broker_key: gft_compte1
    prop_firm: gft
    challenge_phase: 1            # Phase 1 = objectif 8%
    initial_balance: 150000
    profit_target_pct: 8.0        # Phase 1 target
    risk_per_trade_pct: 0.30      # conservatif (daily DD 4% = plus serré que FTMO)
    max_daily_dd_pct: 2.5         # GFT = 4%, garde interne 2.5%
    max_total_dd_pct: 8.0         # GFT = 10%, garde interne 8%
    leverage: 100                 # 1:100
    overnight_allowed: true
    news_trading_allowed: true

  # --------------------------------------------------------------------------
  # DÉMO — Pour tests de connectivité uniquement
