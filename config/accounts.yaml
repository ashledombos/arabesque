  # --------------------------------------------------------------------------
  # GFT — TradeLocker
  # --------------------------------------------------------------------------
  gft_compte2:
    type: tradelocker
    protected: false                # ← funded mais utilisé en test live
    label: "GFT TradeLocker Funded #2 — live test OK"
    is_demo: false
    broker_key: gft_compte2

