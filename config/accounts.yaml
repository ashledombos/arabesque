# =============================================================================
# Arabesque — Configuration des comptes de trading
# =============================================================================
#
# RÈGLE DE SÉCURITÉ :
#   protected: true  → le moteur live REFUSE de trader dessus
#                       sans l'argument --force-live en ligne de commande.
#                       Utilisez protected: true pour TOUS les vrais comptes
#                       tant qu'ils ne sont pas en phase de production validée.
#
#   protected: false → compte utilisable en live test (dry-run, démo, test).
#
# Les credentials (tokens, passwords) restent dans config/secrets.yaml.
# Ce fichier ne contient que des métadonnées et des flags de sécurité.
# =============================================================================

accounts:

  # --------------------------------------------------------------------------
  # FTMO — Compte de test (cTrader)
  # --------------------------------------------------------------------------
  ftmo_swing_test:
    type: ctrader
    protected: false                # ← test OK, pas de fonds réels
    label: "FTMO Swing Test — compte de test, OK pour dry-run et live test"
    is_demo: false                  # cTrader "live" mais compte test FTMO
    broker_key: ftmo_swing_test     # clé dans config/settings.yaml → brokers
    risk_per_trade_pct: 0.45        # funded mode (override general.risk_percent)
    max_daily_dd_pct: 3.0           # FTMO = 5%, garde interne 3%
    max_total_dd_pct: 8.0           # FTMO = 10%, garde interne 8%

  # --------------------------------------------------------------------------
  # FTMO — Challenge / Funded (cTrader)
  # --------------------------------------------------------------------------
