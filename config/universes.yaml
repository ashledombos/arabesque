# =============================================================================
# Arabesque — Univers d'instruments pour backtests
# =============================================================================
# Usage : python -m arabesque run --strategy extension --mode backtest --universe crypto
#
# Chaque clé est un nom d'univers utilisable via --universe.
# Règle anti-surparamétrage : toujours tester sur un univers complet,
# jamais sur un seul instrument. Comparer les résultats par catégorie.
# =============================================================================

