# Source structuree des seuils de docs/VALIDATION_CONTRACT.md.
# Ce fichier est normatif pour les decisions d'agent, mais n'est pas encore
# consomme automatiquement par un runner de validation.
phase:
  name: portefeuille          # remplace phase4_bis (close 2026-07-03, concentration)
  since_utc: "2026-07-03T12:00:00Z"
  # Live actif (seul scope de verdict performance)
  verdict_strategies:
    - glissade                # XAUUSD uniquement (cf strategy_assignments)
  # Candidats en instruction (pipeline avant live)
  candidate_strategies:
    - renverse                # metaux (XAG/XAU) — EN OMBRE depuis 2026-07-04
                              # (assignments + exclusion 2 brokers, 0 ordre).
                              # Backtest 3 mois recents: +0.305R n=16.
                              # Promotion = ~2-4 sem / >=15 signaux + go operateur.
  # Exclues du dispatch, signaux toujours generes (mesure passive)
  shadow_strategies:
    - extension
    - fouette
  informational_only_strategies:
    - cabriole
    - trend
  brokers:
    - ftmo_challenge          # micro-taille (fenetre DD -7/-8), venue de mesure
    - gft_compte1             # venue principale metaux (spread 3x moins cher)

# Objectif systeme (decision operateur 2026-07-03) — cf VALIDATION_CONTRACT.md
system_objective:
  target_r_net_per_month: 1.5
  milestone_r_net_per_month: 0.8
  new_prop_account_gate_r_per_month: 1.5   # pas de nouveau compte avant

# Filtre dur d'acceptation d'un candidat (avant pipeline)
candidate_hard_filter:
  min_gross_edge_vs_cost_ratio: 3.0        # edge brut >= 3x cout du marche vise
  walkforward_recent_months: 18
  min_trades_per_month: 2.0
  require_prop_firm_profile: true          # WR haut, pertes bornees
  cost_study_before_code: true             # lecon Extension

risk_increase_gate:
  minimum_clean_exits_for_review: 30
  preferred_clean_exits_for_decision: 50
  minimum_mean_delta_r: -0.10
  require_execution_invariants_ok: true
  require_no_open_integrity_incident: true
  require_sizing_distortion_review: true

execution_integrity:
  gft:
    require_rest_quote_before_entry: true
    maximum_adverse_entry_r: 0.25
    require_server_side_protection_after_fill: true
    quarantine_new_entries_if_unconfirmed: true

deferred:
  shadow_reference:
    required_before_profitability_claim: true
    may_change_trading_logic: false
