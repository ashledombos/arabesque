# =============================================================================
# Arabesque - Configuration principale
# =============================================================================
# Les credentials sont dans config/secrets.yaml (séparé, non commité)
# Les instruments sont dans config/instruments.yaml (fichier dédié recommandé)
# =============================================================================

# -----------------------------------------------------------------------------
# PARAMÈTRES GÉNÉRAUX
# -----------------------------------------------------------------------------
general:
  risk_percent: 0.45         # Risque par trade (% du capital) — v3.4 relevé 0.40→0.45
  use_equity: true           # Utiliser l'équité (true) ou la balance (false)
  default_rr_ratio: 2.5      # R/R par défaut si non fourni dans le signal
  order_timeout_candles: 4   # Expiration des ordres limites (en bougies)
  candle_timeframe_minutes: 240  # Timeframe des bougies (240 = H4)
  # Multiplicateur de risque par timeframe — appliqué sur le risk_cash après sizing.
  # H4 produit ~1.2 trades/jour en crypto → daily DD naturellement plafonné (~0.6%)
  # → on peut monter le risk sans risquer le daily DD 3%.
  # Validé par backtest 2026-03-22 : H4 crypto 0.60% → daily DD max 0.6%.
  # 1.22 × 0.45% = 0.55% effectif.
  risk_multiplier_by_timeframe:
    "h4": 1.22              # 0.45% × 1.22 ≈ 0.55% effectif
    # "h1": 1.0             # défaut, pas besoin de lister

# -----------------------------------------------------------------------------
# EXÉCUTION
# -----------------------------------------------------------------------------
execution:
  delay_between_brokers:
    enabled: true
    min_ms: 500
    max_ms: 3000
  # Securite min-volume : si l'arrondi broker impose plus de 125% du risque
  # cible apres tous les guards/rodages, rejeter l'ordre au lieu de sur-risquer.
  # Incident fondateur : GFT Glissade XAUUSD 2026-05-19, cible 4.82$,
  # minimum executable ~46.01$ (9.54x).
  max_executed_risk_ratio: 1.25
  # TradeLocker n'utilise pas le feed cTrader declencheur. Avant un nouvel
  # ordre GFT, relire son quote REST et refuser une entree deja degradee.
  # 0.25R preserve la representativite de Phase 4 bis : au-dela, le fill
  # mange une part materielle du risque avant meme que le trade commence.
  gft_preflight:
    enabled: true
    require_quote: true
    max_adverse_slippage_r: 0.25

# -----------------------------------------------------------------------------
# LIVE — Boucles de fond du moteur (BE polling backup, etc.)
# -----------------------------------------------------------------------------
live:
  # Phase 2.5 — boucle de polling broker indépendante du PriceFeed pour armer
  # le BE même quand le stream cTrader meurt silencieusement (cf. incident
  # 14/05 ALREADY_LOGGED_IN). Activé 2026-05-16 après validation gates :
  # tests BE polling (10 tests PASS) + replay incident 14/05 (3 tests PASS,
  # reproduit bug sans polling + prouve fix avec polling). Rollback simple :
  # repasser à false et restart engine. Surveillance 24-48h en cours.
  be_polling_backup: true
  be_polling_interval_s: 60          # tick toutes les 60s
  be_polling_freshness_threshold_s: 300  # skip quote si > 5min (stale)

  # Hot Path #1 (incident DASHUSD 2026-05-21) — heartbeat ReconcileReq actif
  # toutes les 60s dès qu'au moins une position est ouverte. Détecte qu'une
  # position locale n'existe plus côté broker (fermée à notre insu pendant
  # silence trading channel). 3 cycles d'absence consécutifs → alerte URGENT
  # Telegram+ntfy + retrait du tracking. Polling stoppe automatiquement
  # quand `_positions` redevient vide (pas de coût en régime idle).
  # Voir docs/HOT_PATH_MODE_2026-05-23.md pour le plan complet (4 étapes).
  # Activé 2026-05-23 après validation 178/178 tests + lecture de l'audit
  # cTrader FTMO Challenge. Rollback simple : repasser à false + restart engine.
  # Effet immédiat à la prochaine ouverture de position cTrader.
  broker_reconcile_active: true
  broker_reconcile_interval_s: 60
  broker_reconcile_timeout_s: 10
  broker_reconcile_missing_threshold: 3

# -----------------------------------------------------------------------------
# RODAGE — Prudence renforcée pour les stratégies non validées en live
# Multiplicateur appliqué au risk_cash pour les stratégies listées.
# Retirer une stratégie de la liste une fois son rodage terminé.
# -----------------------------------------------------------------------------
rodage:
  enabled: true
  risk_multiplier: 0.25          # 2026-05-03 abaissé 0.50→0.25 — DD FTMO -6.33%, Cabriole 2e audit drift_modéré (option 2 défensive)
  strategies:
    - glissade                   # Activé live 2026-03-22, drift_modéré J-30 (n=8 small-n)
    - fouette                    # Activé live 2026-03-28, WF 4/4 PASS (0 trade live, neutre)
    - cabriole                   # Activé live 2026-03-28, WF 6/6 PASS (drift_modéré 2e audit, n=32, ΔExp=-0.252R)
    - extension                  # 2026-06-05 : drift structurel ΔExp=-0.446R (n=39) sur régime NORMAL (BT colle baseline +0.014R) + intégrité BE_MISSED RED (5 post-cutoff, 1 perte -1.01R MANUSD au ras du seuil 0.30R). Rodage ×0.25 défensif (boussole : protéger la courbe) le temps d'investiguer la fuite d'armement BE + réconcilier divergence edge_audit(BT +0.097R)/replay_live_vs_theory(théo -9.4R). Réévaluer après fix BE.
  # Ultra-rodage : levier disponible si /suivi détecte un drift suspect mais qu'on
  # veut continuer à collecter de la donnée live sans risquer le compte.
  # 0.10% sur compte 100k$ ≈ ~$100/trade — 10 pertes consécutives = 1% du compte.
  # Une stratégie listée ici prend ×0.10 (priorité sur risk_multiplier ci-dessus).
  # Vide par défaut. À activer manuellement après lecture du verdict /suivi.
  risk_multiplier_ultra: 0.10
  strategies_ultra:
    - cabriole                   # 2026-05-13 : creux BT hors distribution baseline 20 mois (<p5, pire historique=-0.163R vs actuel=-0.345R) + drift live additionnel -0.32R sous BT. Ultra-rodage ×0.10 pour protéger la courbe sans couper la mesure live. Réévaluer dans 1-2 mois.

# -----------------------------------------------------------------------------
# STRATÉGIE (v3.3 validé: trend-only)
# -----------------------------------------------------------------------------
strategy:
  type: extension        # nom canonique ; "trend" reste accepté en alias (cf. BarAggregator._make_signal_generator + order_dispatcher)

# -----------------------------------------------------------------------------
# MULTI-STRATÉGIE — Assignments instrument → stratégie + timeframe
# Chaque entrée crée un BarAggregator dédié. Un même instrument peut
# apparaître dans plusieurs stratégies (signaux indépendants).
# La section strategy.type ci-dessus reste le défaut pour les instruments
# non listés ici.
# -----------------------------------------------------------------------------
strategy_assignments:
  # Extension : utilise le timeframe déclaré dans instruments.yaml (H1/H4)
  # Ne pas lister ici = les instruments with follow:true utilisent Extension par défaut
  #extension:
  #  instruments: []  # vide = tous les instruments followed (comportement actuel)

  # Glissade RSI divergence H1 — WF PASS 3/3
  # 2026-07-03 : BTCUSD retiré (banc d'essai Étape 2 : +0.03R brut < 0.12R
  # coûts crypto cTrader, live -0.21R/15 tr → TUER). XAUUSD = seul edge net
  # positif du banc d'essai (~+0.24R net). Cf DECISIONS.md 2026-07-03 ter.
  glissade:
    timeframe: "H1"
    instruments:
      - XAUUSD

  # Fouetté ORB M1 — WF PASS 4/4 (rodage ×0.50)
  fouette:
    timeframe: "M1"
    instruments:
      - XAUUSD      # London session (08:00 UTC winter / 07:00 summer)
      - BTCUSD      # NY session (14:30 UTC winter / 13:30 summer)

  # Cabriole Donchian 4H — DÉSACTIVÉE 2026-05-16
  # Drift live persistant (creux BT hors distribution baseline 20 mois, ΔExp
  # additionnel -0.32R sous BT déjà recalibré pessimiste). Ultra-rodage ×0.10
  # depuis 2026-05-13 jugé insuffisant : on sort du noyau Phase 4 bis tant que
  # le drift n'est pas réexpliqué. Cf docs/PHASE4_BIS_CHECKLIST_2026-05-16.md
  # et docs/DECISIONS.md (2026-05-16).
  # Entrées rodage.strategies/strategies_ultra et strategy_broker_exclusions
  # conservées comme trace historique — réactivation = décommenter ce bloc.
  #cabriole:
  #  timeframe: "H4"
  #  instruments:
  #    - BTCUSD
  #    - ETHUSD
  #    - SOLUSD
  #    - DOGEUSD
  #    - LINKUSD
  #    - ADAUSD

# -----------------------------------------------------------------------------
# PRICE FEED (surveillance prix cTrader)
# -----------------------------------------------------------------------------
price_feed:
  # Broker utilisé comme source de prix (doit être de type ctrader)
  # ftmo_challenge = compte permanent (pas d'expiration 15j)
  source_broker: "ftmo_challenge"
  # Laissez vide : tous les instruments avec follow: true dans instruments.yaml
  # seront automatiquement surveillés.
  # Remplissez uniquement pour restreindre à un sous-ensemble.
  symbols: []
  # symbols:
  #   - GBPUSD
  #   - BTCUSD

# -----------------------------------------------------------------------------
# STRATEGY-BROKER EXCLUSIONS — bloque une stratégie sur un broker donné.
# Motif inscrit dans docs/DECISIONS.md (2026-04-24).
# Pour lever un blocage : vérifier le critère quantifiable associé (ex: Cabriole
# FTMO WR≥70% sur ≥20 trades) puis supprimer l'entrée.
# -----------------------------------------------------------------------------
strategy_broker_exclusions:
  cabriole:
    - gft_compte1              # 0/10 WR vs 77% attendu — block jusqu'à preuve d'edge FTMO
  # 2026-07-03 — Étape 4 banc d'essai (go opérateur « rentabilité d'abord ») :
  # Extension et Fouetté exclues des DEUX brokers. La génération de signaux
  # continue (mesure théorique via replay/audits), AUCUN ordre n'est placé.
  # Extension : aucun edge net en régime récent (crypto +0.05R brut < 0.11R
  # coûts ; forex/métaux négatif BRUT H1 -0.031R / 4H -0.082R — Étape 3.5).
  # Fouetté : parqué (jamais mesurable en live, crypto M1 = pire profil coûts).
  # Réactivation = WF récent net-de-coûts positif + validation opérateur.
  extension:
    - ftmo_challenge
    - gft_compte1
  fouette:
    - ftmo_challenge
    - gft_compte1

# -----------------------------------------------------------------------------
# WEEKEND CRYPTO GUARD — Empêche les nouvelles positions crypto sur cTrader
# le vendredi après le cutoff. cTrader ferme les CFD crypto le weekend,
# créant des gaps de prix à la réouverture (slippage SL confirmé ETHUSD/DASHUSD).
# GFT (TradeLocker) n'est pas affecté (feed continu).
# -----------------------------------------------------------------------------
weekend_crypto_guard:
  enabled: true
  cutoff_utc_hour: 15          # Vendredi 15:00 UTC (~1h après NY open)
  broker_types:                # Types de broker affectés
    - ctrader

# -----------------------------------------------------------------------------
# WEEKEND GAP GUARD — Empêche les nouvelles positions tard le vendredi sur les
# instruments non-crypto explicitement exposés aux gaps de réouverture.
# Incident fondateur : AUDJPY FTMO 2026-05-29 15:00 → 2026-05-31 21:05,
# SL exécuté à -1.565R au lieu de -1R. Ne ferme jamais une position existante.
# -----------------------------------------------------------------------------
weekend_gap_guard:
  enabled: true
  cutoff_utc_hour: 15
  broker_types:
    - ctrader
    - tradelocker
  symbols:
    - AUDJPY
    - GBPJPY
    - CHFJPY
    - XAUUSD

# -----------------------------------------------------------------------------
# FILTRES PRÉ-PLACEMENT
# -----------------------------------------------------------------------------
filters:
  min_margin_percent: 30
  max_daily_drawdown_percent: 4.0
  max_total_drawdown_percent: 9.0
  max_open_positions: 7  # 5->7 le 2026-06-16 : tail-risk crypto corrélé levé (docs/audit/tailrisk_crypto_2026-06-13.md). cap=10 différé jusqu'à reprise DD.
  max_pending_orders: 10
  prevent_duplicate_orders: true

# -----------------------------------------------------------------------------
# BROKERS
# -----------------------------------------------------------------------------
brokers:
  # ---- FTMO Challenge (cTrader) — source principale + trading ----
  ftmo_challenge:
    enabled: true
    type: ctrader
    name: "FTMO Challenge Phase 1"
    is_demo: true             # Challenge FTMO = environnement démo cTrader
    auto_refresh_token: true
    # account_id: dans secrets.yaml

  # ---- GFT Compte 1 (TradeLocker, Challenge GOAT 150k) ----
  gft_compte1:
    enabled: true
    type: tradelocker
    name: "GFT Challenge #1"
    is_demo: false
    base_url: "https://bsb.tradelocker.com"
    server: "GFTTL"

# -----------------------------------------------------------------------------
# INSTRUMENTS
# -----------------------------------------------------------------------------
# Définis dans config/instruments.yaml (recommandé)
# Le champ follow: true/false dans chaque instrument contrôle
# si le symbole est surveillé par le price feed live.
instruments: {}

# -----------------------------------------------------------------------------
# NOTIFICATIONS (optionnel)
# -----------------------------------------------------------------------------
notifications:
  enabled: false
  on_order_placed: true
  on_order_error: true
  # channels: dans config/secrets.yaml → notifications.channels
  # (contient les tokens, ne pas mettre ici)
  channels: []
